<!DOCTYPE html>
<html>
<head>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Diphylleia&family=Gowun+Dodum&family=Grandiflora+One&family=Hahmlet:wght@100..900&family=Nanum+Myeongjo:wght@400;700&display=swap');
</style>
    <meta charset="utf-8">
    <link rel="stylesheet" href="mobile.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비번</title>
</head>
<body>
 <body style="background-color:rgb(6, 6, 6)">
  <form id="loginForm">
    <input type="password" id="passwordInput" placeholder="Enter Password...">
    <button type="submit">확인</button>
  </form>

  <script>
    const correctPassword = "sb"; // this will be visible in source code

    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault(); // stop normal form submission

      const userInput = document.getElementById("passwordInput").value;

      if (userInput === correctPassword) {
        window.location.href = "main.html";
      } else {
        alert("담 넘는 실력이 영 별로던데요!");
      }
    });
  </script>

</body>
</html>
